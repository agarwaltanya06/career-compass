name: CI

# Gate merges on type-safety, lint, and the i18n safety-string drift check.
# Each step fails the job on a non-zero exit, so a broken type, a lint error, or
# a missing/blank (or drifted) unverified-banner translation blocks the PR.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: i18n safety-string check
        run: npm run check:i18n
